<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS Experiment #3</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- main start -->
  <div class="max-w-5xl mx-auto px-4 space-y-8">

    <h1 class="text-3xl font-bold text-center mb-8">Tailwind CSS Experiment #3</h1>
    <p class="text-center text-gray-600">This is a simple navigation bar using Tailwind CSS.</p>

    <!-- nav start -->
    <nav class="bg-sky-500 text-white p-4 rounded-md">
      <ul class="flex justify-center space-x-6">
        <li><a href="#" class="hover:text-yellow-300">Home</a></li>
        <li><a href="#" class="hover:text-yellow-300">About</a></li>
        <li><a href="#" class="hover:text-yellow-300">Contact</a></li>
      </ul>
    </nav>
    <!-- nav end -->

    <div class="banner text-center py-8">
      <h2 class="text-2xl font-semibold">Welcome to Our Site!</h2>
    </div>

    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 bg-gray-100 gap-4 p-4 rounded-lg">
      <div class="box bg-white shadow-md p-6 rounded-md">
        <h2 class="text-xl font-bold">Box 1</h2>
      </div>
      <div class="box bg-white shadow-md p-6 rounded-md">
        <h2 class="text-xl font-bold">Box 2</h2>
      </div>
      <div class="box bg-white shadow-md p-6 rounded-md">
        <h2 class="text-xl font-bold">Box 3</h2>
      </div>
    </section>

    <!-- blog -->
    <div class="bg-gray-900 text-white py-24 sm:py-32 text-center">
      <h2 class="text-3xl font-semibold mb-4">Our Blog Section</h2>
      <p class="text-gray-300">Stay tuned for updates and articles!</p>
    </div>
    <!-- blog end -->

    <footer class="bg-gray-800 text-white text-center py-4 rounded-md">
      <p>&copy; 2026 Tailwind CSS Experiment. All rights reserved.</p>
    </footer>

  </div>
  <!-- main end -->

</html>
