<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout - 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .row{
            margin: 5px;
        }
        .box{
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="container" style="text-align: center;">
        <div class="row" style="background-color: cyan;">
        <div class="col"><h2>1</h2></div>
        <div class="col"><h2>2</h2></div>
    </div>
    <div class="row">
        <div class="col-lg-12" style="background: red;;">
            <h2>3</h2>
        </div>
    </div>
    <div class="row">
        <div class="col-lg-12" style="background: cyan;"> 
            <h2 ">4</h2>
        </div>
    </div>
    
        <div class="row">
        <div class="box" style="display: flex;">
            <div class="col" style="background: red;">
            <h2>5</h2>
        </div>
        <div class="col" style="background-color: cyan;">
            <h2>6</h2>
        </div>
        <div class="col" style="background-color: red;">
            <h2>7</h2>
        </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-12" style="background: violet;">
            <h2>8</h2>
        </div>
    </div>
    </div>
    
</body>
</html>
