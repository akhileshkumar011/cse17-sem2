<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 01</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
       .row{
        border: 2px solid black;
        margin: 5px;
       }
       .col{
        border: 1px solid black;
        
       }
    </style>

</head>
<body>
  <div class="container" style="text-align: center;">
    <!-- Header Start -->
    <div class="row" style="background-color: rgb(71, 2, 71);">
        <div class="col-lg-12">
            <h2 style="color: white;">Header</h2>
        </div>
    </div>
    <!-- Header End -->
    <!-- Nav Bar -->
    <div class="row">
     <div class="col-lg-12" style="background-color: rgb(124, 6, 124);;">
         <h2 style="color: white;">Navbar</h2>
        </div>
    </div>
      <!-- col -->
       <div class="row">
        <div class="col" style="background-color: rgb(156, 3, 156);;">
            <h2 style="color: white;">Col-1</h2>
        </div>
        <div class="col" style="background-color: rgb(156, 3, 156);;">
            <h2 style="color: white;">Col-2</h2>
        </div>
       </div>
       <!-- footer -->
        <div class="row">
            <div class="col-lg-12" style="background-color: rgb(191, 2, 191);;"><h2 style="color: white;">Footer</h2></div>
        </div>
  </div>    
</body>
</html>
